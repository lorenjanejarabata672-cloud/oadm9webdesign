<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<style>
 * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

body {
    background-color: white;
    color: black;
}

/* Container encompassing left bar and main web view */
.app-container {
    display: flex;
    min-height: 100vh;
}

/* Sidebar Navigation */
.sidebar {
    width: 60px;
    background-color: pink;
    border-right: 1px solid #262626;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: center;
    padding: 20px 0;
    position: fixed;
    height: 100vh;
    left: 0;
    top: 0;
}

.sidebar-top i, .menu-icon {
    font-size: 20px;
    color: black;
    margin-bottom: 30px;
    cursor: pointer;
    display: block;
    text-align: center;
}

.sidebar-top i.active, .sidebar-top i:hover, .menu-icon:hover {
    color: black;
}

/* Main Content Area */
.main-content {
    margin-left: 60px;
    flex: 1;
    max-width: 935px;
    margin-right: auto;
    padding: 30px 20px;
}

/* Profile Header Section */
.profile-header {
    display: flex;
    margin-bottom: 44px;
    gap: 40px;
    align-items: flex-start;
}

.profile-avatar-container {
    flex-shrink: 0;
}

.profile-avatar {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid #262626;
}

.profile-info {
    flex: 1;
}

.username-row {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 20px;
}

.username-row h2 {
    font-size: 28px;
    font-weight: 300;
}

.settings-icon {
    font-size: 20px;
    cursor: pointer;
}

.stats-row {
    display: flex;
    gap: 40px;
    margin-bottom: 20px;
    font-size: 16px;
}

.bio-data {
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 20px;
}

.action-buttons {
    display: flex;
    gap: 10px;
}

.btn {
    background-color: pink;
    color: black;
    border: none;
    padding: 8px 16px;
    border-radius: 8px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.2s;
}

.btn:hover {
    background-color: pink;
}

/* Story Highlights */
.highlights-section {
    display: flex;
    gap: 25px;
    margin-bottom: 40px;
    overflow-x: auto;
    padding-bottom: 10px;
}

.highlight-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    font-size: 12px;
    cursor: pointer;
    min-width: 75px;
}

.circle-thumb {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    border: 2px solid #262626;
    padding: 2px;
    margin-bottom: 8px;
    background-color: white-space;
}

.circle-thumb img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
}

.divider {
    border: 0;
    height: 1px;
    background-color: black;
    margin-bottom: 20px;
}

/* Navigation Tabs */
.profile-tabs {
    display: flex;
    justify-content: flex-start;
    gap: 10px;
    margin-bottom: 30px;
    overflow-x: auto;
    padding-bottom: 5px;
}

.tab-btn {
    background-color: pink;
    color: black;
    border: 1px solid #2d2d2f;
    padding: 10px 16px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
}

.tab-btn.active, .tab-btn:hover {
    background-color: pink;
    border-color: pink;
}

/* Content Card Grid Layout */
.cards-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
}

/* Individual Cards styles */
.info-card {
    background-color: pink;
    border-radius: 12px;
    padding: 24px;
    border: 1px solid #1c1c1e;
    display: flex;
    flex-direction: column;
}

.magenta-text {
    color: black;
    font-size: 18px;
    margin-bottom: 15px;
    font-weight: 600;
}

.info-card ul {
    list-style: none;
}

.info-card ul li {
    font-size: 14px;
    text aligment: bold;
    color: black;
    margin-bottom: 10px;
    line-height: 1.4;
    position: relative;
    padding-left: 15px;
}

/* Bullet markers mirroring the screenshot dots */
.info-card ul li::before {
    content: "•";
    color: black;
    position: absolute;
    left: 0;
}

/* Contact Form Layout inside Card */
.contact-form {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 5px;
}

.contact-form input, .contact-form textarea {
    background-color: white;
    border: 1px solid #2c2c2e;
    border-radius: 6px;
    color: black;
    padding: 10px;
    font-size: 13px;
    width: 100%;
}

.contact-form input:focus, .contact-form textarea:focus {
    outline: none;
    border-color: pink;
}

/* Social links specific card adjustments */
.socials-list li {
    word-break: break-all;
}

/* Images Grid handling */
.image-card {
    border-radius: 12px;
    overflow: hidden;
    height: 100%;
    border: 1px solid #1c1c1e;
}

.image-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
}
/* Content Grid Setup */
.content-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
}

/* General Card Design */
.card {
    background-color: pink;
    border-radius: 12px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    min-height: 140px;
}

.card h3 {
    color: black; 
    font-size: 0.95rem;
    font-weight: 700;
    margin-bottom: 12px;
}

.card p {
    font-size: 0.78rem;
    line-height: 1.4;
    color: black;
}

.card ul {
    list-style: none;
}

.card ul li {
    font-size: 0.78rem;
    color: black;
    margin-bottom: 6px;
}

/* Image Grid Cards */
.image-card {
    padding: 0;
    overflow: hidden;
    height: 300px;
    width: 350px;
}

.image-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
</style>

</body>
