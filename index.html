<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Login Clone</title>
</head>
<style>
body {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

body {
    background-color: #000000; 
    color: #ffffff;
    min-height: 100vh;
    overflow-x: hidden;
}

.container {
    display: flex;
    min-height: 100vh;
    width: 100%;
}

/* Left Panel split */
.left-panel {
    flex: 1;
    background-color: #000000;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 40px;
    position: relative;
}

.brand-content {
    max-width: 400px;
    margin-left: auto;
    margin-right: 10%;
    margin-bottom: 40px;
}

.insta-logo {
    width: 60px;
    height: 60px;
    margin-bottom: 30px;
}

.brand-content h1 {
    font-size: 2.5rem;
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: -0.5px;
}

.gradient-text {
    background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* Image Stack Styling */
.image-stack {
    position: relative;
    height: 300px;
    max-width: 400px;
    margin-left: auto;
    margin-right: 10%;
}

.card {
    position: absolute;
    width: 140px;
    height: 200px;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

.card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.card-1 {
    top: 20px;
    left: 0;
    transform: rotate(-5deg);
    z-index: 1;
}

.card-2 {
    top: 0;
    left: 80px;
    z-index: 2;
}

.card-3 {
    top: 30px;
    left: 160px;
    transform: rotate(5deg);
    z-index: 3;
}

/* Right Panel split */
.right-panel {
    flex: 1;
    background-color: #121212;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    padding: 40px 10%;
}

.form-container {
    width: 100%;
    max-width: 350px;
}

.login-title {
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 24px;
    color: #f5f5f5;
}

form {
    display: flex;
    flex-direction: column;
    gap: 12px;
    text-align: center;
}

input {
    width: 100%;
    padding: 14px;
    background-color: #1c1c1e;
    border: 1px solid #2c2c2e;
    border-radius: 10px;
    color: #ffffff;
    font-size: 0.9rem;
    box-sizing: border-box; /* Ensures padding doesn't stretch inputs */
}

input::placeholder {
    color: #727274;
}

input:focus {
    outline: none;
    border-color: #555;
}

.btn-login {
    background-color: #0056b3;
    color: #ffffff;
    border: none;
    border-radius: 20px;
    padding: 12px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.2s;
    text-decoration: none; /* Keeps the text clear of underlines */
}

.btn-login:hover {
    background-color: #004494;
}

.forgot-password {
    display: block;
    text-align: center;
    color: #ffffff;
    font-size: 0.85rem;
    text-decoration: none;
    margin-top: 20px;
    font-weight: 500;
}

.alternative-actions {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 40px;
    width: 100%;
}

.btn-fb {
    background: transparent;
    color: #ffffff;
    border: 1px solid #2c2c2e;
    padding: 12px;
    border-radius: 20px;
    font-weight: 600;
    cursor: pointer;
}

.btn-create {
    background: transparent;
    color: #0056b3;
    border: 1px solid #0056b3;
    padding: 12px;
    border-radius: 20px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
}

.meta-footer {
    text-align: center;
    margin-top: 40px;
    color: #727274;
    font-size: 1.1rem;
    letter-spacing: 0.5px;
}

/* Mobile Responsiveness */
@media (max-width: 768px) {
    .container {
        flex-direction: column;
    }
    
    .left-panel {
        padding: 40px 20px 20px 20px;
    }

    .brand-content {
        margin: 0 auto 20px auto;
        text-align: center;
    }

    .image-stack {
        margin: 0 auto;
        height: 240px;
    }

    .right-panel {
        background-color: #121212;
        padding: 20px;
        align-items: center;
    }
    
    .form-container {
        max-width: 100%;
    }
}
</style>
<body>
    <div class="container">
        <div class="left-panel">
            <div class="brand-content">
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" alt="Instagram Logo" class="insta-logo">
                <h1>See everyday moments from your <span class="gradient-text">close friends.</span></h1>
            </div>
            
            <div class="image-stack">
                <div class="card card-1">
                    <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=400" alt="Friend 1">
                </div>
                <div class="card card-2">
                    <img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?w=400" alt="Friend 2">
                </div>
                <div class="card card-3">
                    <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=400" alt="Friend 3">
                </div>
            </div>
        </div>

        <div class="right-panel">
            <div class="form-container">
                <p class="login-title">Log into Instagram</p>
                
                <form onsubmit="event.preventDefault(); login();">
                    <input type="text" id="username" placeholder="Mobile number, username or email" required>
                    <input type="password" id="password" placeholder="Password" required>
                    <button type="submit" class="btn-login">Log in</button>
                </form>
                <a href="#" class="forgot-password">Forgot password?</a>

                <div class="alternative-actions">
                    <button class="btn-fb">Log in with Facebook</button>
                    <a href="createacc.html" class="btn-create">Create new account</a>
                </div>

                <div class="meta-footer">Meta</div>
            </div>
        </div>
    </div>

<script>
function login() {
    // Fixed: Pulling element values correctly
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    // Fixed: Variables inside the matching statements must be 'user' and 'pass' 
    // Account 1
    if (user === "loreyn_nnn" && pass === "123456") {
        window.location.href = "LorenAboutme.html";
    }
    // Account 2
    else if (user === "Gel_xy" && pass === "246810") {
        window.location.href = "DejaponAboutme.html";
    }
    // Wrong details
    else {
        alert("❌ Invalid email or password. Please try again.");
    }
} // Fixed: Added missing closing bracket for the function
</script>

</body>
</html>
